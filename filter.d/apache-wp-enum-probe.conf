[INCLUDES]
before = common.conf

[Definition]
# Repeated WordPress enumeration/probing that is high-signal in these logs.
# Kept intentionally narrower than a generic 404 jail to reduce false positives.
failregex = ^<ADDR>\s+\S+\s+\S+\s+\[[^]]+\]\s+"(?:GET|HEAD)\s+/(?:(?:wp-admin(?:/.*)?)|(?:wp-includes(?:/.*)?)|(?:wp-content/plugins/.*)|(?:wp-json/wp/v2/users.*)|(?:xmlrpc\.php))(?:\?[^\"]*)?\s+HTTP/1\.[01]"\s+(?:301|302|403|404|405)\b

ignoreregex =
