[INCLUDES]
before = common.conf

[Definition]
# Broader script-probe matcher for access logs.
# Catches mixed-case .php/.phtml/.phar/.cgi/.asp* probes that the current
# apache-php-probe-scan misses, while excluding common legitimate entry points.
failregex = ^<ADDR>\s+\S+\s+\S+\s+\[[^]]+\]\s+"(?:GET|HEAD)\s+/(?!index\.php(?:[?\s])|wp-login\.php(?:[?\s])|wp-cron\.php(?:[?\s])|xmlrpc\.php(?:[?\s])|wp-admin/admin-ajax\.php(?:[?\s]))[^"\s]*?\.(?:(?i:php)\d*|(?i:phtml)|(?i:phar)|(?i:cgi)|(?i:aspx?))(?:\?[^\"]*)?\s+HTTP/1\.[01]"\s+(?:301|302|403|404|405)\b

ignoreregex =
