[INCLUDES]
before = common.conf

[Definition]
# Catches secret-file and framework/admin probes that appear in the access logs,
# including nested and URL-encoded .env lookups.
failregex = ^<ADDR>\s+\S+\s+\S+\s+\[[^]]+\]\s+"(?:GET|POST|HEAD|OPTIONS)\s+/(?:(?:(?:[^"\s]*/)?(?i:(?:%2e|\.)env)(?:[^"\s]*)?)|(?:(?:[^"\s]*/)?(?i:\.git)/(?:config|HEAD))|(?:(?:[^"\s]*/)?(?i:\.aws)/(?:credentials|config))|(?:(?:[^"\s]*/)?(?i:composer\.(?:json|lock)))|(?:(?:[^"\s]*/)?(?i:config\.php(?:\.bak|\.old|~)?))|(?:(?:[^"\s]*/)?(?i:phpinfo\.php))|(?:(?:[^"\s]*/)?(?i:debug/default/view))|(?:(?:[^"\s]*/)?(?i:admin/config))|(?:(?:[^"\s]*/)?(?i:server-status))|(?:(?:[^"\s]*/)?(?i:HNAP1))|(?:(?:[^"\s]*/)?(?i:cgi-bin/.*)))(?:\?[^\"]*)?\s+HTTP/1\.[01]"\s+(?:301|302|400|401|403|404|405)\b

ignoreregex =
